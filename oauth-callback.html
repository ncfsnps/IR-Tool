<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Authentication complete</title>
</head>

<body>
<script>
  // This completes ArcGIS OAuth handshake
  if (window.opener && window.opener.require) {
    window.opener.require([
      "esri/identity/IdentityManager"
    ], function(IdentityManager) {
      IdentityManager.completeOAuthSignIn();
    });
  }

  window.close();
</script>

<p>Completing sign-in...</p>
</body>
</html>
