<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>IR Tool</title>

  <link rel="stylesheet" href="https://js.arcgis.com/4.30/esri/themes/light/main.css">
  <script src="https://js.arcgis.com/4.30/"></script>

  <style>
    html, body, #viewDiv {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    #panel {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 99;
      background: white;
      padding: 10px;
      width: 260px;
      font-family: Arial, sans-serif;
      box-shadow: 0 0 6px rgba(0,0,0,0.2);
    }

    #status {
      font-size: 12px;
      color: #444;
      margin-top: 8px;
    }
  </style>
</head>

<body>

<div id="panel">
  <h3>IR Tool</h3>

  <input type="file" id="fileInput" />
  <br><br>

  <button id="runBtn">Sign In / Run Tool</button>

  <div id="status">Loading map...</div>
</div>

<div id="viewDiv"></div>

<script>
require([
  "esri/Map",
  "esri/views/MapView",
  "esri/layers/FeatureLayer",
  "esri/identity/OAuthInfo",
  "esri/identity/IdentityManager"
], function(
  Map,
  MapView,
  FeatureLayer,
  OAuthInfo,
  IdentityManager
) {

  // -----------------------------
  // 🔐 OAUTH CONFIG (ROBUST MODE)
  // -----------------------------
  const info = new OAuthInfo({
    appId: "yhi27yU7BRlbw7c9",
    popup: true,
    portalUrl: "https://www.arcgis.com"
  });

  IdentityManager.registerOAuthInfos([info]);

  // Handle possible redirect callback gracefully (prevents broken state)
  if (window.location.href.includes("oauth-callback")) {
    console.log("OAuth callback detected — letting ArcGIS handle it.");
  }

  // Check existing session only
  IdentityManager.checkSignInStatus(info.portalUrl + "/sharing")
    .then(() => {
      document.getElementById("status").innerText = "Signed in";
    })
    .catch(() => {
      document.getElementById("status").innerText = "Not signed in";
    });

  // -----------------------------
  // 📍 FEATURE LAYER
  // -----------------------------
  const irLayer = new FeatureLayer({
    url: "https://services6.arcgis.com/3Sj1fiIDvQtFfbvg/arcgis/rest/services/2026_NCFS_IA/FeatureServer/7",
    outFields: ["*"]
  });

  // -----------------------------
  // 🗺 MAP
  // -----------------------------
  const map = new Map({
    basemap: "topo-vector",
    layers: [irLayer]
  });

  const view = new MapView({
    container: "viewDiv",
    map: map,
    center: [-79.5, 35.5],
    zoom: 6
  });

  view.when(() => {
    document.getElementById("status").innerText = "Map loaded";
  });

  // -----------------------------
  // 🔑 LOGIN (USER INITIATED ONLY)
  // -----------------------------
  document.getElementById("runBtn").onclick = async function () {
    try {
      await IdentityManager.getCredential(info.portalUrl + "/sharing");

      document.getElementById("status").innerText = "Signed in successfully";
      alert("Login successful");
    } catch (err) {
      console.log("Login error:", err);
      alert("Login cancelled or failed");
    }
  };

});
</script>

</body>
</html>
